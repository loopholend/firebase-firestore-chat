<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="auth-page">
<div class="card auth-card">
    <div class="card-header">
        <h1>Login</h1>
        <button id="themeToggle" class="ghost-button theme-toggle" type="button">🌙</button>
    </div>
    <p class="success" th:if="${param.registered}">Registration successful. Please log in.</p>
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/login}" th:object="${loginForm}" method="post" class="form-grid">
        <input type="email" th:field="*{email}" placeholder="Email" required>
        <input type="password" th:field="*{password}" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p class="link">Don't have an account? <a th:href="@{/register}">Register</a></p>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
